        // --- DOM ELEMENTS ---
        const els = {
            loadingScreen: document.getElementById('loading-screen'),
            quizScreen: document.getElementById('quiz-screen'),
            resultScreen: document.getElementById('result-screen'),
            
            progressBar: document.getElementById('progress-bar'),
            questionCounter: document.getElementById('question-counter'),
            headerStats: document.getElementById('header-stats'),
            questionText: document.getElementById('question-text'),
            optionsContainer: document.getElementById('options-container'),
            
            explanationBox: document.getElementById('explanation-box'),
            feedbackIcon: document.getElementById('feedback-icon'),
            feedbackTitle: document.getElementById('feedback-title'),
            explanationText: document.getElementById('explanation-text'),
            
            btnPrev: document.getElementById('btn-prev'),
            btnReveal: document.getElementById('btn-reveal'),
            btnNext: document.getElementById('btn-next'),
            btnSubmit: document.getElementById('btn-submit'),
            btnSubmitTop: document.getElementById('btn-submit-top'),
            
            resultScore: document.getElementById('result-score'),
            resultPercent: document.getElementById('result-percent'),
            btnRestart: document.getElementById('btn-restart'),
            btnReview: document.getElementById('btn-review'),
            btnShowWrong: document.getElementById('btn-show-wrong'),
        };

        // --- INITIALIZATION ---
        async function initApp() {
            try {
                const response = await fetch('questions.json');
                if (!response.ok) throw new Error('Cannot fetch file');
                const data = await response.json();
                questions = data;
            } catch (error) {
                console.log("Không tìm thấy questions.json, sử dụng dữ liệu mặc định.");
                questions = fallbackData;
            }

            if(questions.length === 0) {
                els.loadingScreen.innerHTML = "<p class='text-red-500'>Lỗi: Không có dữ liệu câu hỏi.</p>";
                return;
            }

            startGame();
        }

        function startGame() {
            currentIndex = 0;
            userAnswers = {};
            revealedAnswers = {};
            isReviewMode = false;
            reviewFilter = null;
            
            els.loadingScreen.classList.add('hidden');
            els.resultScreen.classList.add('hidden');
            els.quizScreen.classList.remove('hidden');
            els.quizScreen.classList.add('flex');
            
            renderQuestion();
        }

        // --- RENDERING ---
        function renderQuestion() {
            const total = reviewFilter ? reviewFilter.length : questions.length;
            // realIndex là index thực của câu trong mảng questions
            const realIndex = reviewFilter ? reviewFilter[currentIndex] : currentIndex;
            const q = questions[realIndex];
            const hasAnswered = userAnswers.hasOwnProperty(realIndex);
            const isRevealed = revealedAnswers[realIndex] || isReviewMode;
      
            
            // Animation
            els.questionText.classList.remove('animate-fade-in');
            void els.questionText.offsetWidth; 
            els.questionText.classList.add('animate-fade-in');

            // Cập nhật Header
            els.questionCounter.innerHTML = `<i class="fa-solid fa-flag"></i> Câu ${currentIndex + 1} / ${total}`;
            els.headerStats.innerText = `Đã trả lời: ${Object.keys(userAnswers).length}/${questions.length}`;
            const progress = reviewFilter ? ((currentIndex + 1) / total) * 100 : (Object.keys(userAnswers).length / questions.length) * 100;
            els.progressBar.style.width = `${progress}%`;
 
             // Text Câu hỏi
             els.questionText.innerHTML = q.question;
 
             // Render Lựa chọn
             els.optionsContainer.innerHTML = '';
             q.options.forEach((optText, optIndex) => {
                 const btn = document.createElement('button');
                 btn.className = `option-btn w-full text-left p-4 rounded-xl border-2 flex items-start gap-4 mb-3 group focus:outline-none transition-all`;
                
                let letterBoxClass = '';
                
                if (!isRevealed) {
                    btn.onclick = () => handleSelectOption(optIndex);
                    
                    if (hasAnswered && userAnswers[realIndex] === optIndex) {
                        // Trạng thái được chọn trước khi check đáp án
                        btn.classList.add('border-primary-500', 'bg-primary-50');
                        letterBoxClass = 'bg-primary-500 text-white border-primary-500';
                    } else {
                        // Trạng thái bình thường
                        btn.classList.add('border-slate-200', 'hover:border-primary-500', 'bg-white', 'hover:bg-primary-50');
                        letterBoxClass = 'bg-slate-50 text-slate-600 border-slate-200 group-hover:bg-primary-500 group-hover:text-white group-hover:border-primary-500';
                    }
                } else {
                    btn.disabled = true;
                    // Styling khi đã xem đáp án
                    if (optIndex === q.answer) {
                        btn.classList.add('border-emerald-500', 'bg-emerald-50');
                        letterBoxClass = 'bg-emerald-500 text-white border-emerald-500';
                    } else if (userAnswers[realIndex] === optIndex && optIndex !== q.answer) {
                        btn.classList.add('border-rose-500', 'bg-rose-50');
                        letterBoxClass = 'bg-rose-500 text-white border-rose-500';
                    } else {
                        btn.classList.add('border-slate-100', 'bg-white', 'opacity-60');
                        letterBoxClass = 'bg-slate-100 text-slate-500 border-slate-200';
                    }
                }

                // Icon check đúng/sai
                let iconHtml = '';
                if (isRevealed) {
                    if (optIndex === q.answer) {
                        iconHtml = '<i class="fa-solid fa-circle-check text-emerald-500 text-xl pt-1"></i>';
                    } else if (hasAnswered && userAnswers[currentIndex] === optIndex) {
                        iconHtml = '<i class="fa-solid fa-circle-xmark text-rose-500 text-xl pt-1"></i>';
                    }
                } else if (hasAnswered && userAnswers[currentIndex] === optIndex) {
                    iconHtml = '<i class="fa-solid fa-circle-dot text-primary-500 text-xl pt-1 animate-fade-in"></i>';
                }

                btn.innerHTML = `
                    <div class="w-8 h-8 shrink-0 rounded-lg border font-bold flex items-center justify-center transition-colors ${letterBoxClass}">
                        ${alphabet[optIndex]}
                    </div>
                    <div class="flex-grow pt-1 text-slate-700 font-medium leading-relaxed">
                        ${optText}
                    </div>
                    ${iconHtml}
                `;
                els.optionsContainer.appendChild(btn);
            });

            // Logic hiện hộp Giải thích
            if (isRevealed && hasAnswered) {
                const isCorrect = userAnswers[realIndex] === q.answer;
                showExplanation(isCorrect, q.explanation, q, realIndex);
            } else {
                els.explanationBox.classList.add('hidden');
            }

            // --- ĐIỀU CHỈNH TRẠNG THÁI CÁC NÚT ĐIỀU HƯỚNG ---
            els.btnPrev.disabled = currentIndex === 0;
            
            if (isReviewMode) {
                els.btnReveal.classList.add('hidden');
                if (currentIndex === questions.length - 1) {
                    els.btnNext.classList.add('hidden');
                } else {
                    els.btnNext.classList.remove('hidden');
                }
            } else {
                els.btnReveal.classList.remove('hidden');
                
                // Chuyển đổi giữa nút Tiếp Theo / Nộp bài
                if (currentIndex === (reviewFilter ? reviewFilter.length - 1 : questions.length - 1)) {
                    els.btnNext.classList.add('hidden');
                    els.btnSubmit.classList.remove('hidden');
                } else {
                    els.btnNext.classList.remove('hidden');
                    els.btnSubmit.classList.add('hidden');
                }

                // Trạng thái của nút "Hiện đáp án"
                els.btnReveal.className = 'px-6 py-2.5 rounded-xl font-medium transition-all flex items-center gap-2';
                
                if (!isRevealed) {
                    els.btnReveal.innerHTML = '<i class="fa-solid fa-eye"></i> <span>Hiện đáp án</span>';
                    if (!hasAnswered) {
                        els.btnReveal.disabled = true;
                        els.btnReveal.classList.add('bg-slate-200', 'text-slate-400', 'cursor-not-allowed');
                    } else {
                        els.btnReveal.disabled = false;
                        els.btnReveal.classList.add('bg-amber-500', 'hover:bg-amber-600', 'text-white', 'shadow-sm');
                    }
                } else {
                    els.btnReveal.disabled = true;
                    els.btnReveal.innerHTML = '<i class="fa-solid fa-check"></i> <span>Đã kiểm tra</span>';
                    els.btnReveal.classList.add('bg-slate-100', 'text-slate-500', 'border', 'border-slate-200', 'cursor-not-allowed');
                }
            }
        }

        // --- HANDLERS ---
        function handleSelectOption(selectedIndex) {
            const realIndex = reviewFilter ? reviewFilter[currentIndex] : currentIndex;
            if (isReviewMode || revealedAnswers[realIndex]) return;
            
            // Chỉ lưu duy nhất 1 index giá trị thay vì mảng, đảm bảo chức năng "Chỉ chọn 1 đáp án"
            userAnswers[realIndex] = selectedIndex;
            renderQuestion();
        }
 
        function revealAnswer() {
            const realIndex = reviewFilter ? reviewFilter[currentIndex] : currentIndex;
            if (!userAnswers.hasOwnProperty(realIndex) || revealedAnswers[realIndex]) return;
            
            // Lưu trạng thái câu này đã được check
            revealedAnswers[realIndex] = true;
            renderQuestion();
        }
 
        function showExplanation(isCorrect, explanation, q, qIndex) {
             els.explanationBox.classList.remove('hidden');
             
             if (isCorrect) {
                 els.explanationBox.className = 'animate-slide-up rounded-xl border border-emerald-200 bg-emerald-50 p-5 mb-6';
                 els.feedbackIcon.className = 'mt-0.5 rounded-full p-1 w-6 h-6 flex items-center justify-center text-white shrink-0 bg-emerald-500';
                 els.feedbackIcon.innerHTML = '<i class="fa-solid fa-check text-xs"></i>';
                 els.feedbackTitle.className = 'font-bold text-base mb-1 text-emerald-800';
                 els.feedbackTitle.innerText = 'Chính xác!';
                 els.explanationText.innerHTML = explanation || '<i>Không có giải thích chi tiết cho câu hỏi này.</i>';
             } else {
                 els.explanationBox.className = 'animate-slide-up rounded-xl border border-rose-200 bg-rose-50 p-5 mb-6';
                 els.feedbackIcon.className = 'mt-0.5 rounded-full p-1 w-6 h-6 flex items-center justify-center text-white shrink-0 bg-rose-500';
                 els.feedbackIcon.innerHTML = '<i class="fa-solid fa-xmark text-xs"></i>';
                 els.feedbackTitle.className = 'font-bold text-base mb-1 text-rose-800';
                 els.feedbackTitle.innerText = 'Chưa chính xác!';

                // Hiển thị đáp án người dùng chọn và đáp án đúng riêng
                const selected = userAnswers[qIndex];
                let selectedHtml = '';
                if (selected !== undefined && q.options && q.options[selected]) {
                    selectedHtml = `<p class="text-sm text-rose-600 mb-1"><strong>Đáp án bạn chọn:</strong> ${alphabet[selected]}. ${q.options[selected]}</p>`;
                }
                const correctHtml = `<p class="text-sm text-emerald-700 mb-2"><strong>Đáp án đúng:</strong> ${alphabet[q.answer]}. ${q.options[q.answer]}</p>`;

                const explainText = explanation ? `<div class="text-slate-600 text-sm leading-relaxed mb-2">${explanation}</div>` : '';
                els.explanationText.innerHTML = selectedHtml + correctHtml + explainText + '<div class="text-slate-500 text-xs"><i>Gợi ý: Hãy đọc kỹ phần giải thích và lưu ý từ khóa.</i></div>';
             }
         }

        function showResult() {
            // Tính lại toàn bộ điểm ở cuối (Kể cả bấm hiện giải thích hay không thì hệ thống vẫn tính điểm nếu đúng)
            score = 0;
            for (let i = 0; i < questions.length; i++) {
                if (userAnswers.hasOwnProperty(i) && userAnswers[i] === questions[i].answer) {
                    score++;
                }
            }

            els.quizScreen.classList.add('hidden');
            els.quizScreen.classList.remove('flex');
            els.resultScreen.classList.remove('hidden');
            els.resultScreen.classList.add('flex');

            const percent = Math.round((score / questions.length) * 100);
            
            els.resultScore.innerText = `${score}/${questions.length}`;
            els.resultPercent.innerText = `${percent}%`;
            
            if(percent >= 80) {
                els.resultPercent.className = "text-3xl font-bold text-emerald-500";
            } else if(percent >= 50) {
                els.resultPercent.className = "text-3xl font-bold text-amber-500";
            } else {
                els.resultPercent.className = "text-3xl font-bold text-rose-500";
            }
            
            els.progressBar.style.width = `100%`;
            
            // Hiện/ẩn nút "Chỉ câu sai" nếu có sai
            const wrongCount = questions.reduce((acc, q, idx) => acc + ((userAnswers.hasOwnProperty(idx) && userAnswers[idx] !== q.answer) ? 1 : 0), 0);
            if (els.btnShowWrong) {
                if (wrongCount > 0) {
                    els.btnShowWrong.classList.remove('hidden');
                } else {
                    els.btnShowWrong.classList.add('hidden');
                }
            }
        }

        // --- EVENT LISTENERS ---
        els.btnReveal.addEventListener('click', revealAnswer);

        els.btnNext.addEventListener('click', () => {
            if (currentIndex < questions.length - 1) {
                currentIndex++;
                renderQuestion();
            }
        });

        els.btnPrev.addEventListener('click', () => {
            if (currentIndex > 0) {
                currentIndex--;
                renderQuestion();
            }
        });

        els.btnSubmit.addEventListener('click', () => {
            showResult();
        });

        els.btnSubmitTop.addEventListener('click', () => {
            if(confirm("Bạn có chắc chắn muốn nộp bài sớm? Các câu chưa làm sẽ không được tính điểm.")) {
                showResult();
            }
        });

        els.btnRestart.addEventListener('click', () => {
            startGame();
        });

        els.btnReview.addEventListener('click', () => {
            isReviewMode = true;
            reviewFilter = null; // xem tất cả
            currentIndex = 0;
            els.resultScreen.classList.add('hidden');
            els.resultScreen.classList.remove('flex');
            els.quizScreen.classList.remove('hidden');
            els.quizScreen.classList.add('flex');
            
            els.btnSubmitTop.classList.add('hidden');
            renderQuestion();
        });

        // Nút mới: chỉ xem các câu sai
        if (els.btnShowWrong) {
            els.btnShowWrong.addEventListener('click', () => {
                // Tạo danh sách index các câu sai
                const wrongs = [];
                for (let i = 0; i < questions.length; i++) {
                    if (userAnswers.hasOwnProperty(i) && userAnswers[i] !== questions[i].answer) {
                        wrongs.push(i);
                    }
                }
                if (wrongs.length === 0) {
                    alert('Không có câu sai để xem lại.');
                    return;
                }
                isReviewMode = true;
                reviewFilter = wrongs;
                currentIndex = 0;
                els.resultScreen.classList.add('hidden');
                els.resultScreen.classList.remove('flex');
                els.quizScreen.classList.remove('hidden');
                els.quizScreen.classList.add('flex');
                els.btnSubmitTop.classList.add('hidden');
                renderQuestion();
            });
        }

        // Hỗ trợ dùng bàn phím
        document.addEventListener('keydown', (e) => {
            if(els.quizScreen.classList.contains('hidden')) return;
            
            if (e.key === 'Enter' && !els.btnReveal.classList.contains('hidden') && !els.btnReveal.disabled) {
                els.btnReveal.click();
            } else if (e.key === 'ArrowRight' && !els.btnNext.classList.contains('hidden')) {
                els.btnNext.click();
            } else if (e.key === 'ArrowLeft' && !els.btnPrev.disabled) {
                els.btnPrev.click();
            }
        });
   

        // Khởi động
        initApp();
    </script>
